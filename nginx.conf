# Nginx configuration for ArwaEduc domain redirect
# This can be used in Coolify's nginx configuration

server {
    listen 80;
    server_name *.coolify.io *.coolify.dev;
    
    # Redirect all traffic to the main domain
    return 301 https://arwaeduc.enovazoneacadimeca.com$request_uri;
}

server {
    listen 443 ssl;
    server_name *.coolify.io *.coolify.dev;
    
    # Redirect HTTPS traffic to main domain
    return 301 https://arwaeduc.enovazoneacadimeca.com$request_uri;
}

server {
    listen 80;
    listen 443 ssl;
    server_name arwaeduc.enovazoneacadimeca.com;
    
    # Health check endpoint (bypass redirect)
    location /health {
        proxy_pass http://localhost:3000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # API endpoints (bypass redirect) 
    location /api/ {
        proxy_pass http://localhost:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # All other requests
    location / {
        proxy_pass http://localhost:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}